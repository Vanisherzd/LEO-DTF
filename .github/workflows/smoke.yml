name: LEO-DTF Smoke Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Install project with uv
        run: |
          uv sync --extra test

      - name: Run smoke test
        run: uv run python scripts/run_smoke_test.py

      - name: Validate repository state
        run: uv run python scripts/validate_repo_state.py

      - name: Check paper LaTeX sanity
        run: uv run python scripts/check_paper_sanity.py

      - name: Check placeholder citations
        run: |
          if grep -R "todo_" paper/sections paper/refs.bib; then
            echo "Found placeholder todo_ citations"
            exit 1
          fi

      - name: Run multi-pass research smoke test
        run: uv run --extra test pytest tests/test_research_multipass_observability.py -q -vv

      - name: Run observability threshold research smoke test
        run: uv run --extra test pytest tests/test_research_observability_threshold.py -q -vv

      # Full pytest is intentionally not run in CI smoke because the full suite
      # is slow and includes many synthetic diagnostics. Run it manually before
      # major submission checkpoints.
